name: Papyra Windows MSI Release

# Fork-tailored release: builds the Papyra desktop app (bundled backend JRE +
# Spring backend + Tauri shell) as an unsigned Windows MSI and publishes a
# GitHub Release with it. Unlike the upstream multi-OS workflow this needs no
# code-signing or Tauri updater secrets, so it runs on a plain fork.
#
# Trigger it from the Actions tab (workflow_dispatch) or by pushing a v* tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (blank = v<version from tauri.conf.json>)"
        required: false
        default: ""
      publish:
        description: "Publish a GitHub Release (false = build artifact only)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Resolve version and tag
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./frontend/editor/src-tauri/tauri.conf.json').version")
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then TAG="${{ github.ref_name }}"; else TAG="v${VERSION}"; fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building Papyra $VERSION -> release $TAG"

      # Build the bundled backend JAR, the jlink'd JRE, and prepare the frontend.
      # DISABLE_ADDITIONAL_FEATURES keeps the desktop build to the standard set.
      - name: Prepare desktop build
        shell: bash
        env:
          DISABLE_ADDITIONAL_FEATURES: "true"
          JPDFIUM_PLATFORMS: "windows-x64"
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_PUBLIC_URL: ${{ secrets.MAVEN_PUBLIC_URL }}
        run: task desktop:prepare

      # Write a Windows-only Tauri config override (auto-merged over tauri.conf.json):
      #  - always disable updater artifacts (avoids needing the Tauri updater signing key)
      #  - if a WINDOWS_CERTIFICATE secret is present, import it and sign the exe + MSI with
      #    its thumbprint; otherwise build an unsigned MSI. This keeps the fork buildable with
      #    no secrets, and produces a signed MSI once the cert secrets are configured.
      - name: Configure Windows bundle + signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $bundle = @{ createUpdaterArtifacts = $false }
          if ($env:WINDOWS_CERTIFICATE) {
            Write-Host "WINDOWS_CERTIFICATE present - importing and signing."
            $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            $certPath = Join-Path $env:RUNNER_TEMP "papyra-cert.pfx"
            [IO.File]::WriteAllBytes($certPath, $certBytes)
            $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
            Remove-Item $certPath -Force
            Write-Host "Imported certificate thumbprint: $($cert.Thumbprint)"
            $bundle.windows = @{
              certificateThumbprint = $cert.Thumbprint
              digestAlgorithm       = "sha256"
              timestampUrl          = "http://timestamp.digicert.com"
            }
          } else {
            Write-Host "No WINDOWS_CERTIFICATE secret set - building an UNSIGNED MSI."
          }
          $config = @{ bundle = $bundle } | ConvertTo-Json -Depth 6
          $out = "./frontend/editor/src-tauri/tauri.windows.conf.json"
          Set-Content -Path $out -Value $config -Encoding utf8
          Write-Host "Wrote $out:"
          Get-Content $out

      - name: Build Windows MSI
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
        with:
          projectPath: ./frontend/editor
          tauriScript: npx tauri
          args: "--target x86_64-pc-windows-msvc --bundles msi"

      - name: Collect MSI
        id: msi
        shell: bash
        run: |
          mkdir -p dist
          find frontend/editor/src-tauri/target -path "*/bundle/msi/*.msi" -exec cp {} dist/ \;
          echo "=== produced MSI files ==="
          ls -la dist || true
          if [ -z "$(ls dist/*.msi 2>/dev/null)" ]; then
            echo "::error::No MSI was produced by the build"
            exit 1
          fi

      - name: Upload MSI as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: papyra-windows-msi
          path: dist/*.msi
          retention-days: 7

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.publish != 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Papyra ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          files: dist/*.msi
